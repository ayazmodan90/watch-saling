<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sellers - WatchStore Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><span>⌚</span> WatchStore Admin</div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-link">📊 Dashboard</a>
        <a href="/admin/products" class="nav-link">⌚ Products</a>
        <a href="/admin/orders" class="nav-link">📦 Orders</a>
        <a href="/admin/payments" class="nav-link">💳 Payments</a>
        <a href="/admin/users" class="nav-link">👥 Users</a>
        <a href="/admin/sellers" class="nav-link active">🏪 Sellers</a>
        <a href="/" class="nav-link">🏠 View Shop</a>
        <a href="/auth/logout" class="nav-link logout">🚪 Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Seller Management</h1>
        <p>Manage all registered sellers</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="seller : ${sellers}">
                    <td th:text="${seller.id}"></td>
                    <td th:text="${seller.name}"></td>
                    <td th:text="${seller.email}"></td>
                    <td th:text="${seller.phone}"></td>
                    <td>
                        <span class="badge" th:classappend="${seller.status.name()}" th:text="${seller.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(seller.createdAt, 'dd MMM yyyy')}"></td>
                    <td>
                        <form th:action="@{/admin/users/status/{id}(id=${seller.id})}" method="post" style="display:inline">
                            <input type="hidden" name="status"
                                   th:value="${seller.status.name() == 'ACTIVE' ? 'BANNED' : 'ACTIVE'}">
                            <button type="submit"
                                    th:class="${seller.status.name() == 'ACTIVE' ? 'btn btn-sm btn-warning' : 'btn btn-sm btn-success'}"
                                    th:text="${seller.status.name() == 'ACTIVE' ? 'Suspend' : 'Activate'}">
                            </button>
                        </form>
                        <form th:action="@{/admin/users/role/{id}(id=${seller.id})}" method="post" style="display:inline">
                            <input type="hidden" name="role" value="CUSTOMER">
                            <button type="submit" class="btn btn-sm btn-secondary"
                                    onclick="return confirm('Remove seller role?')">
                                Demote
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(sellers)}">
                    <td colspan="7" style="text-align:center">No sellers registered yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
