<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - WatchStore</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background: white; border-radius: 16px; padding: 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
        .login-title { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .login-subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
        .form-group input:focus { border-color: #e94560; }
        .field-error { color: #e94560; font-size: 12px; margin-top: 4px; }
        .btn-register { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a1a2e, #e94560); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .alert-error { background: #fff0f3; border: 1px solid #f5c6cb; color: #721c24; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .login-link { text-align: center; margin-top: 18px; font-size: 13px; color: #666; }
        .login-link a { color: #e94560; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="login-logo">⌚</div>
    <div class="login-title">Create Account</div>
    <div class="login-subtitle">Join WatchStore today</div>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <form action="/auth/register" method="post" th:object="${user}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter your full name" required>
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="Enter your email" required>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Create a password" required>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" th:field="*{phone}" placeholder="Enter your phone number" required>
        </div>
        <button type="submit" class="btn-register">📝 Create Account</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/auth/login">Sign in</a>
    </div>
</div>
</body>
</html>
