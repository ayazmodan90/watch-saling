<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - WatchStore</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; font-size: 40px; margin-bottom: 8px; }
        .login-title { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .login-subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
        .form-group input:focus { border-color: #e94560; }
        .btn-login { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a1a2e, #e94560); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-login:hover { opacity: 0.9; }
        .alert-error { background: #fff0f3; border: 1px solid #f5c6cb; color: #721c24; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .register-link { text-align: center; margin-top: 18px; font-size: 13px; color: #666; }
        .register-link a { color: #e94560; font-weight: 600; text-decoration: none; }
        .admin-hint { background: #f8f9ff; border: 1px solid #d0d5f5; border-radius: 8px; padding: 10px 14px; margin-top: 16px; font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">⌚</div>
    <div class="login-title">WatchStore</div>
    <div class="login-subtitle">Sign in to your account</div>

    <div class="alert-error" th:if="${param.error}">❌ Invalid email or password. Please try again.</div>
    <div class="alert-success" th:if="${param.registered}">✅ Account created! Please login.</div>
    <div class="alert-success" th:if="${param.logout}">👋 Logged out successfully.</div>
    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <form action="/auth/login" method="post">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="admin@watchstore.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">🔐 Sign In</button>
    </form>

    <div class="register-link">
        Don't have an account? <a href="/auth/register">Register</a>
    </div>
    <div class="register-link" style="margin-top:8px;">
        <a href="/shop">← Continue as Guest</a>
    </div>

    <div class="admin-hint">
        🔑 Default Admin: <strong>admin@watchstore.com</strong> / <strong>admin123</strong>
    </div>
</div>
</body>
</html>
