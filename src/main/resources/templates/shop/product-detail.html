<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - WatchStore'">Product Detail</title>
    <link rel="stylesheet" th:href="@{/css/shop.css}">
    <style>
        .product-detail-section { padding: 40px 0; }
        .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        .product-detail-image { border-radius: 16px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .product-detail-image img { width: 100%; height: 400px; object-fit: cover; }
        .product-detail-info { padding: 10px 0; }
        .product-category-badge { display: inline-block; background: #e94560; color: white; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
        .product-detail-name { font-size: 28px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
        .product-detail-brand { font-size: 16px; color: #888; margin-bottom: 16px; }
        .product-detail-price { font-size: 32px; font-weight: 800; color: #e94560; margin-bottom: 20px; }
        .product-detail-desc { color: #555; line-height: 1.8; font-size: 15px; margin-bottom: 24px; }
        .stock-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
        .in-stock { background: #d4edda; color: #155724; }
        .out-stock { background: #f8d7da; color: #721c24; }
        .add-cart-form { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .qty-sel { padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 15px; width: 80px; }
        .btn-buy { background: linear-gradient(135deg, #1a1a2e, #e94560); color: white; padding: 13px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
        .btn-buy:hover { opacity: 0.9; }
        .btn-back { display: inline-block; background: #f5f5f5; color: #333; padding: 13px 24px; border-radius: 8px; font-size: 15px; text-decoration: none; }
        .cart-success { background: #d4edda; color: #155724; padding: 12px 18px; border-radius: 8px; margin-bottom: 18px; font-weight: 600; }
        .related-section { padding: 40px 0; background: #fafafa; }
        @media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header class="header">
    <div class="container">
        <div class="header-inner">
            <a href="/" class="logo">⌚ WatchStore</a>
            <nav class="nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/shop" class="nav-link">Shop</a>
                <a href="/cart" class="nav-link">
                    🛒 Cart
                    <span th:if="${cartCount > 0}" style="background:#e94560;color:white;border-radius:50%;padding:1px 6px;font-size:11px;margin-left:3px;" th:text="${cartCount}">0</span>
                </a>
                <span th:if="${loggedUser != null}">
                    <a href="/my-orders" class="nav-link">My Orders</a>
                    <span style="color:#888;font-size:14px;" th:text="'Hi, ' + ${userName}">Hi</span>
                    <a href="/auth/logout" class="nav-link" style="color:#e94560;">Logout</a>
                </span>
                <span th:if="${loggedUser == null}">
                    <a href="/auth/login" class="nav-link">Login</a>
                </span>
                <a th:if="${userRole == 'ADMIN'}" href="/admin/dashboard" class="nav-link btn-admin">Admin Panel</a>
            </nav>
        </div>
    </div>
</header>

<section class="product-detail-section">
    <div class="container">
        <div class="cart-success" th:if="${cartSuccess != null}" th:text="${cartSuccess}"></div>

        <div class="product-detail-grid">
            <div class="product-detail-image">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=600'}"
                     th:alt="${product.name}">
            </div>
            <div class="product-detail-info">
                <span class="product-category-badge" th:text="${product.category}">Category</span>
                <h1 class="product-detail-name" th:text="${product.name}">Watch Name</h1>
                <p class="product-detail-brand">by <strong th:text="${product.brand}">Brand</strong></p>
                <p class="product-detail-price" th:text="'₹' + ${product.price}">₹0</p>
                <p class="product-detail-desc" th:text="${product.description}">Description</p>

                <span class="stock-badge in-stock" th:if="${product.stock > 0}">
                    ✅ In Stock (<span th:text="${product.stock}">0</span> available)
                </span>
                <span class="stock-badge out-stock" th:if="${product.stock == 0}">❌ Out of Stock</span>
                <br>

                <div th:if="${product.stock > 0}">
                    <form action="/cart/add" method="post" class="add-cart-form">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <select name="quantity" class="qty-sel">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <button type="submit" class="btn-buy">🛒 Add to Cart</button>
                    </form>
                </div>

                <a href="/shop" class="btn-back">← Back to Shop</a>
            </div>
        </div>
    </div>
</section>

<section class="related-section" th:if="${!#lists.isEmpty(relatedProducts)}">
    <div class="container">
        <h2 class="section-title">Related Watches</h2>
        <div class="products-grid">
            <div class="product-card" th:each="rp : ${relatedProducts}">
                <div class="product-image">
                    <img th:src="${rp.imageUrl != null ? rp.imageUrl : 'https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=400'}"
                         th:alt="${rp.name}" style="width:100%;height:200px;object-fit:cover;">
                    <span class="product-category" th:text="${rp.category}"></span>
                </div>
                <div class="product-info">
                    <h3 th:text="${rp.name}"></h3>
                    <p class="brand" th:text="${rp.brand}"></p>
                    <p class="price" th:text="'₹' + ${rp.price}"></p>
                    <a th:href="@{/shop/product/{id}(id=${rp.id})}" class="btn-add">View Details</a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer"><p>© 2025 WatchStore India. All rights reserved.</p></footer>
</body>
</html>
