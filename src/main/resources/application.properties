# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/watchstore_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Server Port
server.port=1050

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App Name
spring.application.name=WatchStore

# Anthropic API Key for WatchBot AI Chatbot
# Set this as environment variable: ANTHROPIC_API_KEY=your_key_here
# Or uncomment and add your key below:
# anthropic.api.key=sk-ant-your-key-here
